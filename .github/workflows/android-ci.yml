name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Gates
        run: |
          ./gradlew test :quality:architecture:testDebugUnitTest lint detekt ktlintCheck :app:assembleDebug :app:assembleRelease :app:assembleE2E
          chmod +x scripts/verify-release-isolation.sh
          ./scripts/verify-release-isolation.sh

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: '**/build/reports'
