name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;35.0.0'

      - name: Grant execute permission
        run: |
          chmod +x gradlew
          chmod +x scripts/*.sh

      - name: Clean
        run: ./gradlew clean

      - name: Test
        run: ./gradlew test

      - name: Architecture Test
        run: ./gradlew :quality:architecture:testDebugUnitTest

      - name: Lint
        run: ./gradlew lint

      - name: Detekt
        run: ./gradlew detekt

      - name: Ktlint
        run: ./gradlew ktlintCheck

      - name: Jacoco Report
        run: ./gradlew jacocoTestReport

      - name: Jacoco Verification
        run: ./gradlew jacocoTestCoverageVerification

      - name: Build Debug
        run: ./gradlew :app:assembleDebug

      - name: Build Release
        run: ./gradlew :app:assembleRelease

      - name: Build E2E
        run: ./gradlew :app:assembleE2E

      - name: Verify Release Isolation
        run: ./scripts/verify-release-isolation.sh

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-artifacts
          path: |
            **/build/reports/**
            app/build/outputs/apk/**
            .maestro/results/**
