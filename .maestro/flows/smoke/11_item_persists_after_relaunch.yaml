appId: com.luisete.queda.e2e
---
- openLink: "queda-e2e://reset"
- tapOn:
    id: "inventory_add_button"
- tapOn:
    id: "add_exact_item_name_input"
- inputText: "Cafe"
- tapOn:
    id: "add_exact_item_quantity_input"
- inputText: "250"
- hideKeyboard
- tapOn:
    id: "add_exact_item_unit_selector"
- tapOn: "Gramos"
- tapOn:
    id: "add_exact_item_save_button"
- extendedWaitUntil:
    visible:
      id: "inventory_screen"
    timeout: 10000
- stopApp
- launchApp
- assertVisible:
    id: "inventory_screen"
- assertVisible: "Cafe"
- assertVisible: "250 g"
