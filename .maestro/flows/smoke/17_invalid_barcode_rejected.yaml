appId: com.luisete.queda.e2e
---
- openLink: "queda-e2e://reset"

- extendedWaitUntil:
    visible:
        id: "inventory_empty_state"
    timeout: 30000

- openLink: "queda-e2e://scan?barcode=4006381333932"

- extendedWaitUntil:
    visible: "Código no válido (dígito de control incorrecto)."
    timeout: 30000

- assertVisible: "Escanear código"

- assertNotVisible: "Añadir alimento"

- tapOn:
    id: "barcode_scanner_close_button"

- extendedWaitUntil:
    visible:
        id: "inventory_empty_state"
    timeout: 30000

- openLink: "queda-e2e://scan?barcode=4006381333931"

- extendedWaitUntil:
    visible: "Añadir alimento"
    timeout: 30000

- assertVisible: "Código de barras asociado: 4006381333931"
